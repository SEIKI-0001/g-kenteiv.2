<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>G検定マスタリーラボ | Gamified Learning Service</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b746b'/%3E%3Cpath d='M18 35l9 9 19-24' stroke='white' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="メインナビゲーション">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">M</div>
          <div>
            <p>G検定マスタリーラボ</p>
            <span>学習ゲーミフィケーション版</span>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item is-active" data-view="dashboard">
            <span aria-hidden="true">⌂</span>
            <span>ダッシュボード</span>
          </button>
          <button class="nav-item" data-view="missions">
            <span aria-hidden="true">✓</span>
            <span>ミッション</span>
          </button>
          <button class="nav-item" data-view="review">
            <span aria-hidden="true">↻</span>
            <span>復習キュー</span>
          </button>
          <button class="nav-item" data-view="mastery">
            <span aria-hidden="true">▦</span>
            <span>マスタリー</span>
          </button>
          <button class="nav-item" data-view="rewards">
            <span aria-hidden="true">◇</span>
            <span>リワード</span>
          </button>
          <button class="nav-item" data-view="coach">
            <span aria-hidden="true">✦</span>
            <span>コーチ</span>
          </button>
        </nav>

        <section class="sidebar-status" aria-label="学習リズム">
          <span class="eyebrow">Rhythm</span>
          <strong>継続 18日</strong>
          <p>休息日を1回だけ保留中。途切れにくい設計で、学習再開を守ります。</p>
        </section>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <div>
            <span class="eyebrow">Learning Gamification Studio</span>
            <h1 id="page-title">今日の学習ループ</h1>
          </div>
          <div class="topbar-actions">
            <div class="status-pill">
              <span>本番まで</span>
              <strong>45日</strong>
            </div>
            <div class="status-pill">
              <span>今日の枠</span>
              <strong>28分</strong>
            </div>
            <button class="icon-button" id="open-challenge" aria-label="クイック診断">?</button>
          </div>
        </header>

        <main id="app" class="content-grid" aria-live="polite"></main>
      </div>
    </div>

    <dialog id="practice-dialog" class="practice-dialog">
      <form method="dialog" class="practice-panel">
        <button class="icon-button close-button" value="cancel" aria-label="閉じる">×</button>
        <div id="practice-content"></div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
